<div class="catalogo-container">

    <section class="hero-carousel">
        <button class="carousel-btn prev">&lt;</button>
        <div class="carousel-content">
            <div class="carousel-banner active">
                <p>Carrusel de imágenes de promociones</p>
            </div>
        </div>
        <button class="carousel-btn next">&gt;</button>
    </section>

    <section class="productos-section">
        <div class="section-header">
            <h2>Elegidos especialmente para ti</h2>
            <a href="#" class="ver-mas">Ver más productos</a>
        </div>

        <div class="productos-grid">

            <div class="producto-card" *ngFor="let producto of productos">

                <div *ngIf="producto.etiquetaPromo" class="promo-badge"
                    [ngClass]="producto.colorPromo === 'red' ? 'bg-red' : 'bg-orange'">
                    {{ producto.etiquetaPromo }}
                </div>

                <div class="producto-imagen-container">
                    <div class="imagen-placeholder">IMG</div>
                </div>

                <div class="producto-info">
                    <h3 class="producto-nombre">{{ producto.nombre }}</h3>
                    <p class="producto-unidad">{{ producto.unidad }}</p>

                    <div class="tag-interesar">
                        Te puede interesar <span class="star-icon">★</span>
                    </div>

                    <div class="producto-precios">
                        <span class="precio-original" *ngIf="producto.precioOriginal">
                            S/ {{ producto.precioOriginal | number:'1.2-2' }}
                        </span>
                        <span class="precio-actual">
                            S/ {{ producto.precioActual | number:'1.2-2' }}
                        </span>
                    </div>
                </div>

                <button class="btn-agregar">
                    Agregar al carrito
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="cart-icon"
                        viewBox="0 0 16 16">
                        <path
                            d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                    </svg>
                </button>

            </div>
        </div>
    </section>
</div>
