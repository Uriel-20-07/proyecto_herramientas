<section class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold" style="color:#495057;">
            Elegidos especialmente para ti
        </h5>
        <a href="#" style="color:#2b78e4; font-size:0.85rem;">
            Ver más productos
        </a>
    </div>

    <div id="productCarousel" class="carousel slide position-relative px-4" data-bs-ride="false">

        <div class="carousel-inner">

            <div *ngFor="let chunk of chunkedProducts; let i = index" class="carousel-item" [class.active]="i === 0">

                <div class="row g-3">
                    <div class="col-6 col-md-3" *ngFor="let product of chunk">
                        <div class="card h-100 border-0 shadow-sm position-relative">

                            <span *ngIf="product.badge"
                                class="position-absolute top-0 start-0 m-2 badge rounded-pill text-white"
                                [style.background-color]="product.badgeColor" style="font-size:0.65rem; z-index:1;">
                                {{ product.badge }}
                            </span>

                            <div class="d-flex align-items-center justify-content-center bg-light"
                                style="height:140px; border-radius:0.375rem 0.375rem 0 0;">
                                <i class="bi bi-box-seam fs-1 text-secondary"></i>
                            </div>

                            <div class="card-body p-2 d-flex flex-column">
                                <!-- INPUT IMAGEN DEL CARRUSEL<3 SOMOS EL ÉXITO CHICOS-->
                                <input type="hidden" [name]="'product_' + product.id" [id]="'product_' + product.id"
                                    [value]="product.name" [attr.alt]="product.name" [attr.max]="product.stock"
                                    [attr.min]="0" [attr.maxlength]="100" [attr.size]="50" [attr.pattern]="product.name"
                                    [attr.list]="'product-list-' + product.id" form="productForm" />

                                <datalist [id]="'product-list-' + product.id">
                                    <option [value]="product.name"></option>
                                </datalist>

                                <small class="text-muted mb-1">{{ product.size }}</small>
                                <p class="fw-semibold mb-2 flex-grow-1" style="font-size:0.82rem; color:#495057;">
                                    {{ product.name }}
                                </p>
                                <div class="mb-2">
                                    <small *ngIf="product.oldPrice"
                                        class="text-decoration-line-through text-muted me-1">
                                        S/ {{ product.oldPrice | number:'1.2-2' }}
                                    </small>
                                    <span class="fw-bold d-block" style="color:#0056B3;">
                                        S/ {{ product.price | number:'1.2-2' }}
                                    </span>
                                </div>
                                <button class="btn btn-sm w-100 text-white mt-auto"
                                    style="background-color:#0056B3; font-size:0.8rem;">
                                    <i class="bi bi-cart-plus me-1"></i>Agregar al carrito
                                </button>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev"
            style="left:-1.5rem; width:2rem;">
            <span class="carousel-control-prev-icon"
                style="filter:invert(1) sepia(1) saturate(5) hue-rotate(190deg);"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next"
            style="right:-1.5rem; width:2rem;">
            <span class="carousel-control-next-icon"
                style="filter:invert(1) sepia(1) saturate(5) hue-rotate(190deg);"></span>
        </button>

    </div>
</section>
